name: Build and test

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.12"]
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest -v

      - name: Compile Python files
        run: python -m py_compile datamatrix2codes/*.py tests/*.py

      - name: Check VBA portability
        run: |
          ! grep -R "VBScript.RegExp" macro/ParseEncodedString.bas
          ! grep -R "CreateObject" macro/ParseEncodedString.bas
          grep -q "DataMatrix2CodesModule" macro/ParseEncodedString.bas
          grep -q "ParseEncodedString" macro/ParseEncodedString.bas
          grep -q "PrepareDataMatrixWorksheet" macro/ParseEncodedString.bas
          grep -q "CONFIDENCE" macro/ParseEncodedString.bas
          grep -q "SetupDataMatrixWorksheet" macro/ParseEncodedString.bas

      - name: Run tests with coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install -r requirements-dev.txt
          python -m coverage run --source=datamatrix2codes -m unittest -v
          python -m coverage report -m --fail-under=90
