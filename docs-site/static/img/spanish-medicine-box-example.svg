<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic Spanish medicine box with printed pharmacy fields and a GS1 DataMatrix symbol</title>
  <desc id="desc">A synthetic medicine package showing printed PC, CAD, SN, and LOTE values next to a DataMatrix-like code and the scanner string produced from it.</desc>
  <rect width="1200" height="560" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="330" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="70" y="70" width="1060" height="62" rx="6" fill="#e5edf7"/>
  <text x="104" y="110" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Medicamento ejemplo</text>
  <text x="840" y="110" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#475569">Caja sintética - sin datos reales</text>

  <text x="104" y="178" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#334155">Datos impresos en la caja</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111827">
    <text x="104" y="225"><tspan font-weight="700">PC:</tspan> 8435232347418</text>
    <text x="104" y="265"><tspan font-weight="700">CAD:</tspan> 11/2028</text>
    <text x="104" y="305"><tspan font-weight="700">SN:</tspan> AWF6VCKB8F2S</text>
    <text x="104" y="345"><tspan font-weight="700">LOTE:</tspan> AD801</text>
  </g>

  <text x="530" y="178" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#334155">Símbolo de la caja</text>
  <text x="530" y="205" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#64748b">GS1 DataMatrix, not a QR code</text>

  <rect x="530" y="225" width="146" height="146" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <g fill="#0f172a">
    <rect x="538" y="233" width="10" height="10"/><rect x="548" y="233" width="10" height="10"/><rect x="568" y="233" width="10" height="10"/><rect x="598" y="233" width="10" height="10"/><rect x="618" y="233" width="10" height="10"/><rect x="648" y="233" width="10" height="10"/>
    <rect x="538" y="243" width="10" height="10"/><rect x="558" y="243" width="10" height="10"/><rect x="588" y="243" width="10" height="10"/><rect x="628" y="243" width="10" height="10"/><rect x="658" y="243" width="10" height="10"/>
    <rect x="538" y="253" width="10" height="10"/><rect x="568" y="253" width="10" height="10"/><rect x="578" y="253" width="10" height="10"/><rect x="608" y="253" width="10" height="10"/><rect x="638" y="253" width="10" height="10"/>
    <rect x="538" y="263" width="10" height="10"/><rect x="558" y="263" width="10" height="10"/><rect x="588" y="263" width="10" height="10"/><rect x="598" y="263" width="10" height="10"/><rect x="648" y="263" width="10" height="10"/><rect x="668" y="263" width="10" height="10"/>
    <rect x="538" y="273" width="10" height="10"/><rect x="578" y="273" width="10" height="10"/><rect x="608" y="273" width="10" height="10"/><rect x="628" y="273" width="10" height="10"/>
    <rect x="538" y="283" width="10" height="10"/><rect x="548" y="283" width="10" height="10"/><rect x="568" y="283" width="10" height="10"/><rect x="598" y="283" width="10" height="10"/><rect x="638" y="283" width="10" height="10"/><rect x="658" y="283" width="10" height="10"/>
    <rect x="538" y="293" width="10" height="10"/><rect x="558" y="293" width="10" height="10"/><rect x="588" y="293" width="10" height="10"/><rect x="618" y="293" width="10" height="10"/><rect x="628" y="293" width="10" height="10"/><rect x="668" y="293" width="10" height="10"/>
    <rect x="538" y="303" width="10" height="10"/><rect x="568" y="303" width="10" height="10"/><rect x="578" y="303" width="10" height="10"/><rect x="608" y="303" width="10" height="10"/><rect x="648" y="303" width="10" height="10"/>
    <rect x="538" y="313" width="10" height="10"/><rect x="548" y="313" width="10" height="10"/><rect x="588" y="313" width="10" height="10"/><rect x="598" y="313" width="10" height="10"/><rect x="628" y="313" width="10" height="10"/><rect x="658" y="313" width="10" height="10"/>
