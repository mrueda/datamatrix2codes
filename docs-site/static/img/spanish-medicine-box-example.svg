    <rect x="538" y="343" width="10" height="10"/><rect x="548" y="343" width="10" height="10"/><rect x="578" y="343" width="10" height="10"/><rect x="588" y="343" width="10" height="10"/><rect x="638" y="343" width="10" height="10"/><rect x="658" y="343" width="10" height="10"/>
    <rect x="538" y="353" width="10" height="10"/><rect x="558" y="353" width="10" height="10"/><rect x="598" y="353" width="10" height="10"/><rect x="608" y="353" width="10" height="10"/><rect x="628" y="353" width="10" height="10"/><rect x="668" y="353" width="10" height="10"/>
  </g>

  <text x="735" y="235" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#334155">Contenido GS1 decodificado</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#111827">
    <text x="735" y="275"><tspan font-weight="700">01</tspan> + GTIN/product code</text>
    <text x="735" y="310"><tspan font-weight="700">21</tspan> + serial number</text>
    <text x="735" y="345"><tspan font-weight="700">10</tspan> + lot/batch</text>
    <text x="735" y="380"><tspan font-weight="700">17</tspan> + expiry date</text>
  </g>

  <text x="70" y="455" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#334155">String that a scanner may type into Excel</text>
  <rect x="70" y="475" width="1060" height="52" rx="4" fill="#0f172a"/>
  <text x="92" y="508" font-family="Consolas, Menlo, monospace" font-size="20" fill="#e2e8f0">010843523234741821AWF6VCKB8F2S10AD80117281100</text>
</svg>
